<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <div id="toolbar-drag" class="toolbar-handle" title="Drag to move">⠿</div>
      <div class="toolbar-group">
        <button class="tool-btn active" data-tool="circle" title="Circle (C)">◯</button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">▭</button>
        <button class="tool-btn" data-tool="arrow" title="Arrow (A)">→</button>
        <button class="tool-btn" data-tool="freehand" title="Freehand (F)">✎</button>
        <button class="tool-btn" data-tool="text" title="Text (T)">T</button>
        <button class="tool-btn" data-tool="marker" title="Marker (N)">#</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="color-btn active" data-color="#FF3B30" style="background:#FF3B30" title="Red"></button>
        <button class="color-btn" data-color="#007AFF" style="background:#007AFF" title="Blue"></button>
        <button class="color-btn" data-color="#34C759" style="background:#34C759" title="Green"></button>
        <button class="color-btn" data-color="#FFCC00" style="background:#FFCC00" title="Yellow"></button>
        <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF" title="White"></button>
        <button class="color-btn" data-color="#000000" style="background:#000000" title="Black"></button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button class="width-btn" data-width="2" title="Thin">━</button>
        <button class="width-btn active" data-width="4" title="Medium">━</button>
        <button class="width-btn" data-width="6" title="Thick">━</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button id="btn-dim" class="action-btn" title="Dim layer (D)">◐</button>
        <button id="btn-undo" class="action-btn" title="Undo (Ctrl+Z)">↩</button>
        <button id="btn-clear" class="action-btn" title="Clear">✕</button>
      </div>
      <div class="toolbar-divider"></div>
      <div class="toolbar-group">
        <button id="btn-save" class="action-btn save-btn" title="Save (Enter)">✓</button>
      </div>
    </div>

    <!-- Main canvas -->
    <canvas id="canvas"></canvas>

    <!-- Text input overlay (hidden by default) -->
    <input type="text" id="text-input" placeholder="Type label..." />
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
